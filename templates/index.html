<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Assistant - Chat Support</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="chatbot-container">
        <!-- Header -->
        <div class="header">
            <div class="header-content">
                <button id="toggleSidebarBtn" class="sidebar-toggle-btn" aria-label="Toggle sidebar">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
                    </svg>
                </button>
                <div class="logo-section">
                    <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                    </svg>
                    <h1 class="title">Medical Assistant</h1>
                </div>
                
                <div class="theme-toggle-wrapper">
                    <input type="checkbox" id="themeToggle" class="toggle-checkbox">
                    <label for="themeToggle" class="toggle-label">
                        <span class="toggle-inner">
                            <svg class="toggle-sun" viewBox="0 0 24 24" fill="currentColor">
                                <circle cx="12" cy="12" r="5"/>
                                <line x1="12" y1="1" x2="12" y2="3"/>
                                <line x1="12" y1="21" x2="12" y2="23"/>
                                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                                <line x1="1" y1="12" x2="3" y2="12"/>
                                <line x1="21" y1="12" x2="23" y2="12"/>
                                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                            </svg>
                            <svg class="toggle-moon" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                            </svg>
                        </span>
                        <span class="toggle-switch"></span>
                    </label>
                </div>
            </div>
            <p class="subtitle">Intelligent medical information & support</p>
        </div>

        <div class="app-shell">
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <div>
                        <h2>Chats</h2>
                        <p class="sidebar-subtitle">Your saved sessions</p>
                    </div>
                </div>

                <button id="newChatBtn" class="new-chat-btn">+ New Chat</button>
                <div class="chat-list" id="chatList"></div>
            </aside>

            <main class="chat-container">
                <div class="chat-header">
                    <div>
                        <h2 id="chatTitle">Welcome</h2>
                        <p class="chat-meta" id="chatMeta">Select a chat or create a new one.</p>
                    </div>
                </div>

                <div class="messages-area" id="messagesArea"></div>

                <div class="input-area">
                    <form id="messageForm" class="input-form">
                        <div class="input-wrapper">
                            <textarea
                                id="userInput"
                                class="message-input"
                                rows="1"
                                placeholder="Type your health question here..."
                                autocomplete="off"
                            ></textarea>
                            <button type="submit" class="send-btn" title="Send message">
                                <svg class="send-icon" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M16.6915026,12.4744748 L3.50612381,13.2599618 C3.19218622,13.2599618 3.03521743,13.4170592 3.03521743,13.5741566 L1.15159189,20.0151496 C0.8376543,20.8006365 0.99,21.89 1.77946707,22.52 C2.41,22.99 3.50612381,23.1 4.13399899,22.8429026 L21.714504,14.0454487 C22.6563168,13.5741566 23.1272231,12.6315722 22.9702544,11.6889879 L4.13399899,1.16151495 C3.34915502,0.9 2.40734225,0.9 1.77946707,1.4429026 C0.994623095,1.98788591 0.837654326,3.0772816 1.15159189,3.86275849 L3.03521743,10.3037515 C3.03521743,10.4608489 3.34915502,10.6179463 3.50612381,10.6179463 L16.6915026,11.4034332 C16.6915026,11.4034332 17.1624089,11.4034332 17.1624089,11.8747254 C17.1624089,12.3460175 16.6915026,12.4744748 16.6915026,12.4744748 Z"/>
                                </svg>
                            </button>
                        </div>
                    </form>
                    <p class="disclaimer">ℹ This service stores chat history for your UI only. Conversations are not sent to the language model.</p>
                </div>
            </main>
        </div>
    </div>

    <script>
        const sidebar = document.getElementById('sidebar');
        const toggleSidebarBtn = document.getElementById('toggleSidebarBtn');
        const newChatBtn = document.getElementById('newChatBtn');
        const chatList = document.getElementById('chatList');
        const messagesArea = document.getElementById('messagesArea');
        const messageForm = document.getElementById('messageForm');
        const userInput = document.getElementById('userInput');
        const chatTitle = document.getElementById('chatTitle');
        const chatMeta = document.getElementById('chatMeta');

        let currentChatId = null;
        let currentUserId = null;
        let chatIndex = [];

        const themeToggle = document.getElementById('themeToggle');

        toggleSidebarBtn.addEventListener('click', () => {
            sidebar.classList.toggle('sidebar-closed');
        });

        themeToggle.addEventListener('change', () => {
            document.documentElement.setAttribute('data-theme', themeToggle.checked ? 'dark' : 'light');
            localStorage.setItem('theme', themeToggle.checked ? 'dark' : 'light');
        });

        // Load saved theme
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        themeToggle.checked = savedTheme === 'dark';

        newChatBtn.addEventListener('click', createChat);

        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                messageForm.dispatchEvent(new Event('submit'));
            }
        });

        messageForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = userInput.value.trim();
            if (!message) return;

            if (!currentChatId) {
                const chat = await createChat();
                currentChatId = chat.chat_id;
            }

            addMessage(message, 'user');
            userInput.value = '';
            showTypingIndicator();

            try {
                const formData = new URLSearchParams();
                formData.append('user_id', currentUserId);
                formData.append('chat_id', currentChatId);
                formData.append('msg', message);

                const response = await fetch('/get', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: formData.toString(),
                });

                const botResponse = await response.text();
                removeTypingIndicator();
                addMessage(botResponse, 'bot');
                await refreshChatList();
                setChatMeta();
            } catch (error) {
                console.error('Error sending message:', error);
                removeTypingIndicator();
                addMessage('Sorry, I encountered an error. Please try again.', 'bot');
            }
        });

        async function init() {
            currentUserId = getOrCreateUserId();
            await refreshChatList();

            if (chatIndex.length > 0) {
                selectChat(chatIndex[0].chat_id);
            } else {
                const chat = await createChat();
                selectChat(chat.chat_id);
            }
        }

        function getOrCreateUserId() {
            const stored = localStorage.getItem('medicalChatUserId');
            if (stored) return stored;
            const id = crypto.randomUUID();
            localStorage.setItem('medicalChatUserId', id);
            return id;
        }

        async function refreshChatList() {
            const response = await fetch(`/api/chats?user_id=${encodeURIComponent(currentUserId)}`);
            const chats = await response.json();
            chatIndex = chats;
            renderChatList(chats);
            if (!currentChatId && chats.length > 0) {
                currentChatId = chats[0].chat_id;
            }
        }

        function renderChatList(chats) {
            chatList.innerHTML = '';
            if (!chats.length) {
                chatList.innerHTML = '<div class="empty-list">No chats yet. Click New Chat to begin.</div>';
                return;
            }

            chats.forEach((chat) => {
                const item = document.createElement('button');
                item.type = 'button';
                item.dataset.chatId = chat.chat_id;
                item.className = `chat-item ${chat.chat_id === currentChatId ? 'selected' : ''}`;
                item.innerHTML = `
                    <span>${escapeHtml(chat.title)}</span>
                    <small>${new Date(chat.created_at).toLocaleString()}</small>
                `;
                item.addEventListener('click', () => selectChat(chat.chat_id));
                chatList.appendChild(item);
            });
        }

        async function selectChat(chatId) {
            currentChatId = chatId;
            const response = await fetch(`/api/chat/${chatId}?user_id=${encodeURIComponent(currentUserId)}`);
            if (!response.ok) return;
            const chat = await response.json();
            chatTitle.textContent = chat.title || 'Medical Assistant';
            currentChatId = chat.chat_id;
            renderMessages(chat.messages || []);
            setChatMeta(chat);
            highlightSelectedChat();
        }

        function highlightSelectedChat() {
            document.querySelectorAll('.chat-item').forEach((element) => {
                element.classList.toggle('selected', element.dataset.chatId === currentChatId);
            });
        }

        async function createChat() {
            const response = await fetch('/api/chat/new', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ user_id: currentUserId }),
            });
            const chat = await response.json();
            await refreshChatList();
            currentChatId = chat.chat_id;
            chatTitle.textContent = chat.title;
            renderMessages([]);
            setChatMeta(chat);
            return chat;
        }

        function renderMessages(messages) {
            messagesArea.innerHTML = '';

            if (!messages.length) {
                messagesArea.innerHTML = '<div class="empty-chat">Your chat is ready. Send the first message to begin.</div>';
                return;
            }

            messages.forEach((message) => {
                addMessage(message.content, message.role === 'user' ? 'user' : 'bot');
            });
        }

        function addMessage(message, sender) {
            const messageElement = document.createElement('div');
            messageElement.className = `message ${sender}-message`;

            const avatarSvg = sender === 'user'
                ? '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>'
                : '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/></svg>';

            messageElement.innerHTML = `
                <div class="message-avatar ${sender}-avatar">
                    ${avatarSvg}
                </div>
                <div class="message-content">
                    <p>${escapeHtml(message)}</p>
                </div>
            `;

            messagesArea.appendChild(messageElement);
            scrollToBottom();
        }

        function showTypingIndicator() {
            const typingElement = document.createElement('div');
            typingElement.className = 'message bot-message typing-indicator';
            typingElement.id = 'typingIndicator';
            typingElement.innerHTML = `
                <div class="message-avatar bot-avatar">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/>
                    </svg>
                </div>
                <div class="message-content">
                    <div class="typing">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </div>
            `;
            messagesArea.appendChild(typingElement);
            scrollToBottom();
        }

        function removeTypingIndicator() {
            const typingIndicator = document.getElementById('typingIndicator');
            if (typingIndicator) {
                typingIndicator.remove();
            }
        }

        function renderMessages(messages) {
            messagesArea.innerHTML = '';
            if (!messages.length) {
                messagesArea.innerHTML = '<div class="empty-chat">Your chat is ready. Send the first message to begin.</div>';
                return;
            }
            messages.forEach((message) => addMessage(message.content, message.role === 'user' ? 'user' : 'bot'));
        }

        function scrollToBottom() {
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return String(text).replace(/[&<>"']/g, (m) => map[m]);
        }

        function setChatMeta(chat = {}) {
            const count = Array.isArray(chat.messages) ? chat.messages.length : 0;
            chatMeta.textContent = count > 0 ? `${count} messages stored` : 'No messages yet. Start the conversation.';
        }

        init();
    </script>
</body>
</html>
